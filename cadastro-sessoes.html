<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Sessões</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🎬 Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-salas.html">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-sessoes.html">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sessoes.html">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venda-ingressos.html">Comprar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="mb-4">Cadastro de Sessões</h1>

                <!-- Formulário -->
                <form id="formSessao">
                    <div class="mb-3">
                        <label for="filme" class="form-label">Filme</label>
                        <select class="form-select" id="filme" required>
                            <option value="">Selecione um filme</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="sala" class="form-label">Sala</label>
                        <select class="form-select" id="sala" required>
                            <option value="">Selecione uma sala</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="dataHora" class="form-label">Data e Hora</label>
                        <input type="datetime-local" class="form-control" id="dataHora" required>
                    </div>

                    <div class="mb-3">
                        <label for="preco" class="form-label">Preço</label>
                        <input type="number" class="form-control" id="preco" placeholder="Ex: 30.00" step="0.01" required>
                    </div>

                    <div class="mb-3">
                        <label for="idioma" class="form-label">Idioma</label>
                        <select class="form-select" id="idioma" required>
                            <option value="">Selecione o idioma</option>
                            <option value="Dublado">Dublado</option>
                            <option value="Legendado">Legendado</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="formato" class="form-label">Formato</label>
                        <select class="form-select" id="formato" required>
                            <option value="">Selecione o formato</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Salvar Sessão</button>
                </form>

                <div id="mensagem" class="mt-3"></div>

                <!-- Lista de Sessões -->
                <div class="mt-5">
                    <h3>Sessões Cadastradas</h3>
                    <div id="listaSessoes"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/sessoes.js"></script>
</body>
</html>
