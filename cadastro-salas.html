<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🎬 Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-salas.html">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-sessoes.html">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sessoes.html">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venda-ingressos.html">Comprar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="mb-4">Cadastro de Salas</h1>

                <!-- Formulário -->
                <form id="formSala">
                    <div class="mb-3">
                        <label for="nomeSala" class="form-label">Nome da Sala</label>
                        <input type="text" class="form-control" id="nomeSala" placeholder="Ex: Sala 1" required>
                    </div>

                    <div class="mb-3">
                        <label for="capacidade" class="form-label">Capacidade</label>
                        <input type="number" class="form-control" id="capacidade" placeholder="Ex: 100" required>
                    </div>

                    <div class="mb-3">
                        <label for="tipo" class="form-label">Tipo de Sala</label>
                        <select class="form-select" id="tipo" required>
                            <option value="">Selecione o tipo</option>
                            <option value="2D">2D</option>
                            <option value="3D">3D</option>
                            <option value="IMAX">IMAX</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Salvar Sala</button>
                </form>

                <div id="mensagem" class="mt-3"></div>

                <!-- Lista de Salas -->
                <div class="mt-5">
                    <h3>Salas Cadastradas</h3>
                    <div id="listaSalas"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/salas.js"></script>
</body>
</html>
