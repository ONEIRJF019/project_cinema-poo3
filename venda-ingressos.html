<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingressos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🎬 Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-salas.html">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-sessoes.html">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sessoes.html">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venda-ingressos.html">Comprar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="mb-4">Venda de Ingressos</h1>

                <!-- Formulário -->
                <form id="formIngresso">
                    <div class="mb-3">
                        <label for="sessao" class="form-label">Sessão</label>
                        <select class="form-select" id="sessao" required>
                            <option value="">Selecione uma sessão</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="nomeCliente" class="form-label">Nome do Cliente</label>
                        <input type="text" class="form-control" id="nomeCliente" placeholder="Digite o nome" required>
                    </div>

                    <div class="mb-3">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="Ex: 123.456.789-00" required>
                    </div>

                    <div class="mb-3">
                        <label for="assento" class="form-label">Assento</label>
                        <input type="text" class="form-control" id="assento" placeholder="Ex: A10" required>
                    </div>

                    <div class="mb-3">
                        <label for="pagamento" class="form-label">Tipo de Pagamento</label>
                        <select class="form-select" id="pagamento" required>
                            <option value="">Selecione o tipo</option>
                            <option value="Cartão">Cartão</option>
                            <option value="Pix">Pix</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Confirmar Venda</button>
                </form>

                <div id="mensagem" class="mt-3"></div>

                <!-- Lista de Ingressos -->
                <div class="mt-5">
                    <h3>Ingressos Vendidos</h3>
                    <div id="listaIngressos"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ingressos.js"></script>
</body>
</html>
