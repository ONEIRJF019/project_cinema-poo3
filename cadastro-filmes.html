<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Filmes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu de Navegação -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🎬 Cinema</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-filmes.html">Filmes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-salas.html">Salas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cadastro-sessoes.html">Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="sessoes.html">Ver Sessões</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="venda-ingressos.html">Comprar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo Principal -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="mb-4">Cadastro de Filmes</h1>

                <!-- Formulário -->
                <form id="formFilme">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título do Filme *</label>
                        <input type="text" class="form-control" id="titulo" placeholder="Digite o título" required>
                    </div>

                    <div class="mb-3">
                        <label for="genero" class="form-label">Gênero *</label>
                        <select class="form-select" id="genero" required>
                            <option value="">Selecione um gênero</option>
                            <option value="Ação">Ação</option>
                            <option value="Comédia">Comédia</option>
                            <option value="Drama">Drama</option>
                            <option value="Ficção Científica">Ficção Científica</option>
                            <option value="Horror">Horror</option>
                            <option value="Romance">Romance</option>
                            <option value="Animação">Animação</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <textarea class="form-control" id="descricao" rows="3" placeholder="Descreva o filme" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="classificacao" class="form-label">Classificação Indicativa</label>
                        <select class="form-select" id="classificacao" required>
                            <option value="">Selecione a classificação</option>
                            <option value="L">Livre</option>
                            <option value="10">10 anos</option>
                            <option value="12">12 anos</option>
                            <option value="14">14 anos</option>
                            <option value="16">16 anos</option>
                            <option value="18">18 anos</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="duracao" class="form-label">Duração (em minutos)</label>
                        <input type="number" class="form-control" id="duracao" placeholder="Ex: 120" required>
                    </div>

                    <div class="mb-3">
                        <label for="dataEstreia" class="form-label">Data de Estreia</label>
                        <input type="date" class="form-control" id="dataEstreia" required>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100">Salvar Filme</button>
                </form>

                <div id="mensagem" class="mt-3"></div>

                <!-- Lista de Filmes -->
                <div class="mt-5">
                    <h3>Filmes Cadastrados</h3>
                    <div id="listaFilmes"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/filmes.js"></script>
</body>
</html>
